name: Build iOS Unsigned IPA (Scarlet/Sideloadly Compatible)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Build unsigned IPA
    runs-on: macos-14
    timeout-minutes: 60
    defaults:
      run:
        working-directory: frontend

    env:
      APP_NAME: Ryhavean
      BUNDLE_ID: com.ryhavean.spotify
      DEPLOYMENT_TARGET: "13.0"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Ruby & install xcpretty
        run: |
          sudo gem install xcpretty --no-document || gem install xcpretty --user-install --no-document

      - name: Install JS dependencies
        shell: bash
        run: |
          set -e
          rm -rf node_modules package-lock.json
          npm install --legacy-peer-deps

      - name: Build React web app
        shell: bash
        run: |
          set -e
          set -o pipefail
          export NODE_OPTIONS="--max_old_space_size=4096 --openssl-legacy-provider"

          cat > .env.production <<EOF
          REACT_APP_BACKEND_URL=https://ryhavean-spotify-backend.onrender.com
          GENERATE_SOURCEMAP=false
          EOF

          # CI=false - warning-ları fatal etməsin, amma əsl error fatal qalır
          CI=false npm run build

          # Build-in nəticəsini doğrula
          if [ ! -d "build" ] || [ -z "$(ls -A build 2>/dev/null)" ]; then
            echo "::error::React build folder boşdur və ya yoxdur. Build uğursuz oldu."
            exit 1
          fi
          echo "✅ React build hazırdır:"
          du -sh build/

      - name: Add iOS native project (Capacitor)
        shell: bash
        run: |
          set -e
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
          npx cap sync ios

      - name: Patch Podfile (disable signing for all Pods)
        shell: bash
        run: |
          set -e
          PODFILE="ios/App/Podfile"
          if [ ! -f "$PODFILE" ]; then
            echo "::error::Podfile tapılmadı: $PODFILE"
            exit 1
          fi

          # Mövcud post_install bloku varsa silirik
          python3 - <<'PY'
          import re, pathlib
          p = pathlib.Path("ios/App/Podfile")
          src = p.read_text()
          # Existing post_install bloku təmizlə
          src = re.sub(r"post_install\s+do\s+\|installer\|.*?end\s*", "", src, flags=re.DOTALL)
          patch = """
          post_install do |installer|
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
                config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
                config.build_settings['CODE_SIGN_IDENTITY'] = ''
                config.build_settings['EXPANDED_CODE_SIGN_IDENTITY'] = ''
                config.build_settings['ENABLE_BITCODE'] = 'NO'
                config.build_settings['ONLY_ACTIVE_ARCH'] = 'NO'
                config.build_settings['EXCLUDED_ARCHS[sdk=iphonesimulator*]'] = 'arm64'
              end
            end
          end
          """
          p.write_text(src.rstrip() + "\n\n" + patch.strip() + "\n")
          print(p.read_text())
          PY

      - name: Patch project.pbxproj (deployment target & disable signing)
        shell: bash
        run: |
          set -e
          PROJ="ios/App/App.xcodeproj/project.pbxproj"
          if [ -f "$PROJ" ]; then
            # iOS deployment target-i 13.0-a salaq, geniş uyğunluq üçün
            sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*;/IPHONEOS_DEPLOYMENT_TARGET = 13.0;/g' "$PROJ"
            # Code signing-i app target üçün də söndürək
            sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' "$PROJ" || true
            sed -i '' 's/CODE_SIGN_IDENTITY = "[^"]*";/CODE_SIGN_IDENTITY = "";/g' "$PROJ" || true
            sed -i '' 's/DEVELOPMENT_TEAM = [A-Z0-9]*;/DEVELOPMENT_TEAM = "";/g' "$PROJ" || true
            sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER = "[^"]*";/PROVISIONING_PROFILE_SPECIFIER = "";/g' "$PROJ" || true
          fi

      - name: Patch AppDelegate.swift (enable background audio playback)
        shell: bash
        run: |
          set -e
          APP_DELEGATE="ios/App/App/AppDelegate.swift"
          if [ ! -f "$APP_DELEGATE" ]; then
            echo "::error::AppDelegate.swift tapılmadı: $APP_DELEGATE"
            exit 1
          fi

          python3 - <<'PY'
          import re, pathlib
          p = pathlib.Path("ios/App/App/AppDelegate.swift")
          src = p.read_text()

          # 1) AVFoundation import əlavə et (yoxdursa)
          if "import AVFoundation" not in src:
              src = re.sub(r"(import UIKit\s*\n)", r"\1import AVFoundation\n", src, count=1)

          # 2) didFinishLaunchingWithOptions daxilinə AVAudioSession konfiqurasiyası əlavə et
          if "AVAudioSession.sharedInstance()" not in src:
              audio_block = (
                  "        // RyAudioManager: arxa plan / kilid ekranında musiqi davam etsin\n"
                  "        do {\n"
                  "            let session = AVAudioSession.sharedInstance()\n"
                  "            try session.setCategory(.playback, mode: .default, options: [])\n"
                  "            try session.setActive(true)\n"
                  "        } catch {\n"
                  "            print(\"[Ryhavean] AudioSession setup error: \\(error)\")\n"
                  "        }\n"
              )
              # didFinishLaunchingWithOptions metodunun açılış mötərizəsindən sonra inject edirik
              pattern = r"(func application\([^)]*didFinishLaunchingWithOptions[^{]*\{\s*\n)"
              new_src, n = re.subn(pattern, r"\1" + audio_block, src, count=1)
              if n == 0:
                  print("::warning::didFinishLaunchingWithOptions tapılmadı, AudioSession əlavə olunmadı")
              else:
                  src = new_src

          # 3) App arxa plana keçəndə də audio session aktiv qalsın
          if "applicationDidEnterBackground" in src and "session.setActive(true)" not in src.split("applicationDidEnterBackground")[1][:500]:
              # Mövcud applicationDidEnterBackground metodunun gövdəsinə əlavə et
              bg_pattern = r"(func applicationDidEnterBackground\([^)]*\)[^{]*\{\s*\n)"
              bg_block = (
                  "        do {\n"
                  "            try AVAudioSession.sharedInstance().setActive(true)\n"
                  "        } catch {\n"
                  "            print(\"[Ryhavean] BG AudioSession error: \\(error)\")\n"
                  "        }\n"
              )
              src = re.sub(bg_pattern, r"\1" + bg_block, src, count=1)

          p.write_text(src)
          print("===== Yenilənmiş AppDelegate.swift =====")
          print(src)
          PY

      - name: Fix Info.plist (Bundle ID, MinimumOSVersion, Background modes)
        shell: bash
        run: |
          set -e
          PLIST="ios/App/App/Info.plist"
          if [ ! -f "$PLIST" ]; then
            echo "::error::Info.plist tapılmadı: $PLIST"
            exit 1
          fi

          PB=/usr/libexec/PlistBuddy

          # Display Name
          $PB -c "Set :CFBundleDisplayName ${APP_NAME}" "$PLIST" 2>/dev/null || \
            $PB -c "Add :CFBundleDisplayName string ${APP_NAME}" "$PLIST"

          # Bundle Identifier (capacitor.config ilə uyğun olmalıdır)
          $PB -c "Set :CFBundleIdentifier ${BUNDLE_ID}" "$PLIST" 2>/dev/null || \
            $PB -c "Add :CFBundleIdentifier string ${BUNDLE_ID}" "$PLIST"

          # Versiya
          $PB -c "Set :CFBundleShortVersionString 1.0.0" "$PLIST" 2>/dev/null || \
            $PB -c "Add :CFBundleShortVersionString string 1.0.0" "$PLIST"
          $PB -c "Set :CFBundleVersion 1" "$PLIST" 2>/dev/null || \
            $PB -c "Add :CFBundleVersion string 1" "$PLIST"

          # MinimumOSVersion - ən geniş uyğunluq üçün
          $PB -c "Set :MinimumOSVersion ${DEPLOYMENT_TARGET}" "$PLIST" 2>/dev/null || \
            $PB -c "Add :MinimumOSVersion string ${DEPLOYMENT_TARGET}" "$PLIST"

          # Background modes (audio + fetch)
          $PB -c "Delete :UIBackgroundModes" "$PLIST" 2>/dev/null || true
          $PB -c "Add :UIBackgroundModes array" "$PLIST"
          $PB -c "Add :UIBackgroundModes:0 string audio" "$PLIST"
          $PB -c "Add :UIBackgroundModes:1 string fetch" "$PLIST"

          # ATS (HTTP-yə icazə) - bəzi backend-lər üçün
          $PB -c "Delete :NSAppTransportSecurity" "$PLIST" 2>/dev/null || true
          $PB -c "Add :NSAppTransportSecurity dict" "$PLIST"
          $PB -c "Add :NSAppTransportSecurity:NSAllowsArbitraryLoads bool true" "$PLIST"

          # UIRequiresFullScreen - bəzi sideload mühitlərində problemləri həll edir
          $PB -c "Set :UIRequiresFullScreen true" "$PLIST" 2>/dev/null || \
            $PB -c "Add :UIRequiresFullScreen bool true" "$PLIST"

          # Encryption export compliance (Apple xəbərdarlığını söndürür)
          $PB -c "Set :ITSAppUsesNonExemptEncryption false" "$PLIST" 2>/dev/null || \
            $PB -c "Add :ITSAppUsesNonExemptEncryption bool false" "$PLIST"

          echo "✅ Info.plist yeniləndi:"
          $PB -c "Print" "$PLIST" | head -60

      - name: Install CocoaPods
        shell: bash
        run: |
          set -e
          set -o pipefail
          cd ios/App
          pod install --repo-update

      - name: Build Unsigned Archive
        shell: bash
        run: |
          set -e
          set -o pipefail
          cd ios/App

          # Xcpretty-nin yolunu tap
          XCPRETTY=$(command -v xcpretty || echo "")

          XCBUILD_CMD=(xcodebuild
            -workspace App.xcworkspace
            -scheme App
            -configuration Release
            -sdk iphoneos
            -destination "generic/platform=iOS"
            -archivePath "$PWD/build/${APP_NAME}.xcarchive"
            CODE_SIGNING_ALLOWED=NO
            CODE_SIGNING_REQUIRED=NO
            CODE_SIGN_IDENTITY=
            EXPANDED_CODE_SIGN_IDENTITY=
            DEVELOPMENT_TEAM=
            PROVISIONING_PROFILE_SPECIFIER=
            AD_HOC_CODE_SIGNING_ALLOWED=YES
            ENABLE_BITCODE=NO
            ONLY_ACTIVE_ARCH=NO
            ARCHS=arm64
            IPHONEOS_DEPLOYMENT_TARGET=13.0
            archive)

          if [ -n "$XCPRETTY" ]; then
            "${XCBUILD_CMD[@]}" | tee build.log | "$XCPRETTY"
          else
            "${XCBUILD_CMD[@]}" | tee build.log
          fi

          # Archive uğurlu olmasını yoxla
          if [ ! -d "build/${APP_NAME}.xcarchive/Products/Applications" ]; then
            echo "::error::Archive yaradılmadı və ya pozulub"
            tail -100 build.log || true
            exit 1
          fi

      - name: Package Unsigned IPA (Scarlet/Sideloadly compatible)
        shell: bash
        run: |
          set -e
          set -o pipefail
          cd ios/App

          ARCHIVE_APPS="build/${APP_NAME}.xcarchive/Products/Applications"
          APP_PATH=$(find "$ARCHIVE_APPS" -maxdepth 1 -type d -name "*.app" | head -n 1)

          if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
            echo "::error::Archive daxilində .app tapılmadı"
            ls -laR build/${APP_NAME}.xcarchive || true
            exit 1
          fi

          APP_BASENAME=$(basename "$APP_PATH")
          echo "📦 Tapılan .app: $APP_BASENAME"

          # Payload qovluğunu hazırla
          rm -rf build/Payload
          mkdir -p build/Payload
          cp -R "$APP_PATH" "build/Payload/"

          DEST_APP="build/Payload/${APP_BASENAME}"

          # Sideloadly/Scarlet üçün təmizlik:
          # 1. Mövcud kod imzasını sil (Scarlet öz imzasını qoyacaq)
          rm -rf "${DEST_APP}/_CodeSignature"
          # 2. Provisioning profili sil
          rm -f "${DEST_APP}/embedded.mobileprovision"
          # 3. Frameworks daxilindəki imzaları da sil
          if [ -d "${DEST_APP}/Frameworks" ]; then
            find "${DEST_APP}/Frameworks" -type d -name "_CodeSignature" -exec rm -rf {} + 2>/dev/null || true
            find "${DEST_APP}/Frameworks" -type f -name "embedded.mobileprovision" -delete 2>/dev/null || true
          fi
          # 4. PlugIns və Watch app-ları daxilindəki imzalar
          for sub in PlugIns Watch; do
            if [ -d "${DEST_APP}/${sub}" ]; then
              find "${DEST_APP}/${sub}" -type d -name "_CodeSignature" -exec rm -rf {} + 2>/dev/null || true
              find "${DEST_APP}/${sub}" -type f -name "embedded.mobileprovision" -delete 2>/dev/null || true
            fi
          done

          # Sanity check: .app ölçüsü minimum olmalı (Capacitor app təxminən 8MB+ olur)
          APP_SIZE_KB=$(du -sk "${DEST_APP}" | cut -f1)
          APP_SIZE_MB=$((APP_SIZE_KB / 1024))
          echo "📏 .app ölçüsü: ${APP_SIZE_MB} MB (${APP_SIZE_KB} KB)"
          echo "📂 .app içindəkilər:"
          ls -la "${DEST_APP}" | head -40

          if [ -d "${DEST_APP}/Frameworks" ]; then
            echo "🔗 Frameworks:"
            ls "${DEST_APP}/Frameworks"
          else
            echo "::warning::.app daxilində Frameworks qovluğu yoxdur!"
          fi

          if [ -d "${DEST_APP}/public" ] || [ -d "${DEST_APP}/App.app/public" ]; then
            echo "🌐 Web assets mövcuddur ✅"
          else
            echo "::warning::Web assets (public/) tapılmadı, baxış lazımdır"
          fi

          if [ "$APP_SIZE_KB" -lt 3000 ]; then
            echo "::error::.app bundle çox kiçikdir (${APP_SIZE_KB} KB). Build natamamdır."
            echo "Bu adətən Frameworks-in embed olunmaması deməkdir."
            exit 1
          fi

          # IPA-nı yığ
          cd build
          rm -f "${APP_NAME}-unsigned.ipa"
          zip -qry "${APP_NAME}-unsigned.ipa" Payload
          rm -rf Payload

          IPA_SIZE_KB=$(du -sk "${APP_NAME}-unsigned.ipa" | cut -f1)
          IPA_SIZE_MB=$((IPA_SIZE_KB / 1024))
          echo "✅ IPA hazırdır: ${APP_NAME}-unsigned.ipa (${IPA_SIZE_MB} MB / ${IPA_SIZE_KB} KB)"

          if [ "$IPA_SIZE_KB" -lt 2000 ]; then
            echo "::error::IPA çox kiçikdir. Yenidən yoxlayın."
            exit 1
          fi

      - name: Upload Finished IPA
        uses: actions/upload-artifact@v4
        with:
          name: Ryhavean-Final-IPA
          path: frontend/ios/App/build/Ryhavean-unsigned.ipa
          retention-days: 30

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: frontend/ios/App/build.log
          retention-days: 7
