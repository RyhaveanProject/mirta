          </dict>
          </plist>
          EOF
          plutil -lint "$PLIST"
          echo "Info.plist OK"

      - name: Install CocoaPods
        run: cd ios/App && pod install --repo-update

      - name: Create entitlements
        shell: bash
        run: |
          cat > ios/App/App/App.entitlements <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>get-task-allow</key>
              <true/>
          </dict>
          </plist>
          EOF
          plutil -lint ios/App/App/App.entitlements

      - name: Build Archive
        shell: bash
        run: |
          set -e
          set -o pipefail
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace -scheme App \
            -configuration Release -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -archivePath "$PWD/build/${APP_NAME}.xcarchive" \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY= DEVELOPMENT_TEAM= \
            PROVISIONING_PROFILE_SPECIFIER= \
            ENABLE_BITCODE=NO ARCHS=arm64 \
            IPHONEOS_DEPLOYMENT_TARGET=13.0 \
            archive 2>&1 | tee build.log

      - name: Fake-sign with ldid
        shell: bash
        run: |
          set -e
          cd ios/App
          APP_PATH=$(find "build/${APP_NAME}.xcarchive/Products/Applications" -maxdepth 1 -type d -name "*.app" | head -n 1)
          ENT="App/App.entitlements"

          find "$APP_PATH" -name "_CodeSignature" -type d -exec rm -rf {} + 2>/dev/null || true
          find "$APP_PATH" -name "embedded.mobileprovision" -delete 2>/dev/null || true

          if command -v ldid >/dev/null 2>&1; then
            if [ -d "$APP_PATH/Frameworks" ]; then
              find "$APP_PATH/Frameworks" -type f \( -name "*.dylib" -o -path "*/Frameworks/*" -name "*.framework" -prune -o -type f \) -print | while read f; do
                if file "$f" 2>/dev/null | grep -q "Mach-O"; then
                  ldid -S "$f" 2>/dev/null || true
                fi
              done
            fi
            if [ -f "$APP_PATH/App" ]; then
              ldid -S"$ENT" "$APP_PATH/App" || ldid -S "$APP_PATH/App"
            fi
          else
            if [ -d "$APP_PATH/Frameworks" ]; then
              for fw in "$APP_PATH/Frameworks"/*.framework; do
                [ -d "$fw" ] || continue
                codesign --force --sign - --timestamp=none "$fw"
              done
            fi
            codesign --force --sign - --timestamp=none --entitlements "$ENT" "$APP_PATH"
          fi

          codesign -dv "$APP_PATH" 2>&1 || true

      - name: Package IPA
        shell: bash
        run: |
          set -e
          cd ios/App
          APP_PATH=$(find "build/${APP_NAME}.xcarchive/Products/Applications" -maxdepth 1 -type d -name "*.app" | head -n 1)
          APP_BASENAME=$(basename "$APP_PATH")

          rm -rf build/Payload build/IPA_ROOT
          mkdir -p build/IPA_ROOT/Payload
          cp -R "$APP_PATH" "build/IPA_ROOT/Payload/"

          DEST_APP="build/IPA_ROOT/Payload/${APP_BASENAME}"
          find "$DEST_APP" -name ".DS_Store" -delete 2>/dev/null || true
          find "$DEST_APP" -name "__MACOSX" -exec rm -rf {} + 2>/dev/null || true

          cat > build/IPA_ROOT/iTunesMetadata.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>artistName</key><string>Ryhavean</string>
              <key>bundleDisplayName</key><string>${APP_NAME}</string>
              <key>bundleShortVersionString</key><string>1.0.1</string>
              <key>bundleVersion</key><string>2</string>
              <key>copyright</key><string>(c) 2026 Ryhavean</string>
              <key>fileExtension</key><string>.ipa</string>
              <key>genre</key><string>Music</string>
              <key>genreId</key><integer>6011</integer>
              <key>itemId</key><integer>0</integer>
              <key>itemName</key><string>${APP_NAME}</string>
              <key>kind</key><string>software</string>
              <key>playlistArtistName</key><string>Ryhavean</string>
              <key>playlistName</key><string>${APP_NAME}</string>
              <key>releaseDate</key><string>2026-01-01T00:00:00Z</string>
              <key>softwareIcon57x57URL</key><string></string>
              <key>softwareIconNeedsShine</key><false/>
              <key>softwareSupportedDeviceIds</key><array><integer>1</integer></array>
              <key>softwareVersionBundleId</key><string>${BUNDLE_ID}</string>
              <key>softwareVersionExternalIdentifier</key><integer>1</integer>
              <key>vendorId</key><integer>0</integer>
          </dict>
          </plist>
          EOF
          plutil -lint build/IPA_ROOT/iTunesMetadata.plist

          ICON_1024="$GITHUB_WORKSPACE/frontend/public/ios-icons/AppIcon-1024.png"
          if [ -f "$ICON_1024" ]; then
            cp "$ICON_1024" build/IPA_ROOT/iTunesArtwork
            cp "$ICON_1024" build/IPA_ROOT/iTunesArtwork@2x
          fi

          PB=/usr/libexec/PlistBuddy
          DN=$($PB -c 'Print :CFBundleDisplayName' "${DEST_APP}/Info.plist")
          BN=$($PB -c 'Print :CFBundleName' "${DEST_APP}/Info.plist")
          if [ "$DN" != "${APP_NAME}" ] || [ "$BN" != "${APP_NAME}" ]; then
            echo "::error::Bundle name mismatch"; exit 1
          fi

          cd build/IPA_ROOT
          rm -f "../${APP_NAME}.ipa"
          zip -qry -X "../${APP_NAME}.ipa" .
          cd ..
          rm -rf IPA_ROOT

          echo "IPA size: $(du -h ${APP_NAME}.ipa | cut -f1)"
          unzip -l "${APP_NAME}.ipa" | grep -q "Payload/.*\.app/Info.plist" && echo "Info.plist OK" || { echo "::error::Info.plist missing"; exit 1; }
          unzip -l "${APP_NAME}.ipa" | grep -q "Frameworks/Capacitor.framework" && echo "Capacitor OK" || { echo "::error::Capacitor missing"; exit 1; }
          unzip -l "${APP_NAME}.ipa" | grep -q "LaunchScreen.storyboardc" && echo "LaunchScreen OK" || echo "::warning::LaunchScreen storyboard not compiled"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Ryhavean-Final-IPA
          path: frontend/ios/App/build/Ryhavean.ipa
          retention-days: 30

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: frontend/ios/App/build.log
          retention-days: 7
