name: Build iOS Unsigned IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Build unsigned IPA
    runs-on: macos-14
    timeout-minutes: 60
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22  # Daha stabil versiya

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install JS dependencies
        run: |
          npm install --legacy-peer-deps

      - name: Build React web app
        run: |
          # Webpack-in Node 17+ versiyalarında verdiyi OpenSSL xətasını aradan qaldırmaq üçün
          export NODE_OPTIONS=--openssl-legacy-provider || true
          
          cat > .env.production <<EOF
          REACT_APP_BACKEND_URL=https://ryhavean-spotify-backend.onrender.com
          GENERATE_SOURCEMAP=false
          EOF
          
          # Build komandasını CI mühiti üçün tənzimləyirik
          CI=false npm run build

      - name: Add iOS native project (Capacitor)
        run: |
          npx cap add ios || npx cap sync ios
          npx cap sync ios

      - name: Fix Info.plist & Bundle Configuration
        run: |
          set -e
          PLIST="ios/App/App/Info.plist"
          if [ -f "$PLIST" ]; then
            /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName Ryhavean" "$PLIST" 2>/dev/null || \
              /usr/libexec/PlistBuddy -c "Add :CFBundleDisplayName string Ryhavean" "$PLIST"
            /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier com.ryhavean.music" "$PLIST" 2>/dev/null || \
              /usr/libexec/PlistBuddy -c "Add :CFBundleIdentifier string com.ryhavean.music" "$PLIST"
            /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.0" "$PLIST" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Set :CFBundleVersion 1" "$PLIST" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Delete :UIBackgroundModes" "$PLIST" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes array" "$PLIST" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes:0 string audio" "$PLIST" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes:1 string fetch" "$PLIST" 2>/dev/null || true
          fi

      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install --repo-update

      - name: Build Unsigned Archive
        run: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$PWD/build/Ryhavean.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            archive | xcpretty || exit 1

      - name: Package Corrected IPA Structure
        run: |
          cd ios/App
          mkdir -p build/Payload
          APP_PATH=$(find build/Ryhavean.xcarchive/Products/Applications -maxdepth 1 -type d -name "*.app" | head -n 1)
          cp -R "$APP_PATH" build/Payload/
          cd build
          zip -qr Ryhavean-unsigned.ipa Payload
          rm -rf Payload

      - name: Upload Finished IPA
        uses: actions/upload-artifact@v4
        with:
          name: Ryhavean-Final-IPA
          path: frontend/ios/App/build/Ryhavean-unsigned.ipa
          retention-days: 7
