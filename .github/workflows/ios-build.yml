name: Build iOS Unsigned IPA

# Pulsuz iOS IPA build — macOS runner istifadə edir.
# Manual trigger və ya main branch-a push olunduqda işləyir.
# Çıxış: unsigned .ipa faylı GitHub Actions Artifacts-də göstərilir.
# Onu endirin və AltStore / Sideloadly ilə pulsuz Apple ID istifadə edərək imzalayın.

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Build unsigned IPA
    runs-on: macos-14
    timeout-minutes: 60
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install Yarn dependencies
        run: |
          if [ -f yarn.lock ]; then
            yarn install --frozen-lockfile
          else
            npm install
          fi

      - name: Expo prebuild (generate native iOS project)
        run: npx expo prebuild --platform ios --no-install --clean
        env:
          CI: 1

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Build unsigned .xcarchive
        run: |
          cd ios
          # find workspace name dynamically
          WORKSPACE=$(ls -d *.xcworkspace | head -n 1)
          SCHEME=$(echo "$WORKSPACE" | sed 's/\.xcworkspace$//')
          echo "Using workspace=$WORKSPACE scheme=$SCHEME"

          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$PWD/build/Ryhavean.xcarchive" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            archive | xcpretty || exit 1

      - name: Package unsigned IPA
        run: |
          cd ios
          mkdir -p build/Payload
          # locate the .app inside the archive
          APP_PATH=$(find build/Ryhavean.xcarchive/Products/Applications -maxdepth 1 -type d -name "*.app" | head -n 1)
          echo "App path: $APP_PATH"
          cp -R "$APP_PATH" build/Payload/
          cd build
          zip -qr Ryhavean-unsigned.ipa Payload
          ls -la Ryhavean-unsigned.ipa
          rm -rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ryhavean-unsigned-ipa
          path: frontend/ios/build/Ryhavean-unsigned.ipa
          retention-days: 30
          if-no-files-found: error
