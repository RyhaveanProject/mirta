name: Build iOS IPA (Scarlet Enterprise v4 - LaunchFix + LiveServer)

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 60
    defaults:
      run:
        working-directory: frontend
    env:
      APP_NAME: Ryhavean
      BUNDLE_ID: com.ryhavean.spotify
      DEPLOYMENT_TARGET: "13.0"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18.20.4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install ldid
        run: brew install ldid || true

      - name: Install JS deps
        run: |
          set -e
          export NODE_OPTIONS="--max_old_space_size=4096 --openssl-legacy-provider"
          rm -rf node_modules package-lock.json
          if ! command -v yarn >/dev/null 2>&1; then npm install -g yarn --force; fi
          yarn install --network-timeout 600000 --ignore-engines

      - name: Build React
        run: |
          set -e
          export NODE_OPTIONS="--max_old_space_size=4096 --openssl-legacy-provider"
          export DISABLE_ESLINT_PLUGIN=true SKIP_PREFLIGHT_CHECK=true
          cat > .env.production <<EOF
          REACT_APP_BACKEND_URL=https://ryhavean-spotify-backend.onrender.com
          GENERATE_SOURCEMAP=false
          EOF
          CI=false yarn build

      - name: Add iOS native (Capacitor)
        run: |
          if [ ! -d "ios" ]; then npx cap add ios; fi
          npx cap sync ios

      - name: Setup AppIcon
        shell: bash
        run: |
          set -e
          ICON_SRC="public/ios-icons"
          ICON_DST="ios/App/App/Assets.xcassets/AppIcon.appiconset"
          mkdir -p "$ICON_DST"
          for sz in 20 29 40 58 60 76 80 87 120 152 167 180 1024; do
            [ -f "$ICON_SRC/AppIcon-${sz}.png" ] && cp -f "$ICON_SRC/AppIcon-${sz}.png" "$ICON_DST/"
          done
          cat > "$ICON_DST/Contents.json" <<'JSON'
          {
            "images" : [
              { "size" : "20x20", "idiom" : "iphone", "filename" : "AppIcon-40.png", "scale" : "2x" },
              { "size" : "20x20", "idiom" : "iphone", "filename" : "AppIcon-60.png", "scale" : "3x" },
              { "size" : "29x29", "idiom" : "iphone", "filename" : "AppIcon-58.png", "scale" : "2x" },
              { "size" : "29x29", "idiom" : "iphone", "filename" : "AppIcon-87.png", "scale" : "3x" },
              { "size" : "40x40", "idiom" : "iphone", "filename" : "AppIcon-80.png", "scale" : "2x" },
              { "size" : "40x40", "idiom" : "iphone", "filename" : "AppIcon-120.png", "scale" : "3x" },
              { "size" : "60x60", "idiom" : "iphone", "filename" : "AppIcon-120.png", "scale" : "2x" },
              { "size" : "60x60", "idiom" : "iphone", "filename" : "AppIcon-180.png", "scale" : "3x" },
              { "size" : "20x20", "idiom" : "ipad", "filename" : "AppIcon-20.png", "scale" : "1x" },
              { "size" : "20x20", "idiom" : "ipad", "filename" : "AppIcon-40.png", "scale" : "2x" },
              { "size" : "29x29", "idiom" : "ipad", "filename" : "AppIcon-29.png", "scale" : "1x" },
              { "size" : "29x29", "idiom" : "ipad", "filename" : "AppIcon-58.png", "scale" : "2x" },
              { "size" : "40x40", "idiom" : "ipad", "filename" : "AppIcon-40.png", "scale" : "1x" },
              { "size" : "40x40", "idiom" : "ipad", "filename" : "AppIcon-80.png", "scale" : "2x" },
              { "size" : "76x76", "idiom" : "ipad", "filename" : "AppIcon-76.png", "scale" : "1x" },
              { "size" : "76x76", "idiom" : "ipad", "filename" : "AppIcon-152.png", "scale" : "2x" },
              { "size" : "83.5x83.5", "idiom" : "ipad", "filename" : "AppIcon-167.png", "scale" : "2x" },
              { "size" : "1024x1024", "idiom" : "ios-marketing", "filename" : "AppIcon-1024.png", "scale" : "1x" }
            ],
            "info" : { "version" : 1, "author" : "xcode" }
          }
          JSON

      - name: "FIX WHITE SCREEN - Setup Splash + LaunchScreen storyboard"
        shell: bash
        run: |
          set -e
          # 1) Splash imageset (logo gostermek ucun)
          SPLASH_SRC="public/icons/splash.png"
          [ ! -f "$SPLASH_SRC" ] && SPLASH_SRC="public/icons/icon-512.png"

          SPLASH_DST="ios/App/App/Assets.xcassets/Splash.imageset"
          mkdir -p "$SPLASH_DST"
          cp -f "$SPLASH_SRC" "$SPLASH_DST/splash.png"
          cp -f "$SPLASH_SRC" "$SPLASH_DST/splash@2x.png"
          cp -f "$SPLASH_SRC" "$SPLASH_DST/splash@3x.png"

          cat > "$SPLASH_DST/Contents.json" <<'JSON'
          {
            "images" : [
              { "idiom" : "universal", "filename" : "splash.png",    "scale" : "1x" },
              { "idiom" : "universal", "filename" : "splash@2x.png", "scale" : "2x" },
              { "idiom" : "universal", "filename" : "splash@3x.png", "scale" : "3x" }
            ],
            "info" : { "version" : 1, "author" : "xcode" }
          }
          JSON

          # 2) LaunchScreen.storyboard - ag ekran problemini hell edir
          # Logo ortada, qara fon (#0a0a0b) ile
          mkdir -p "ios/App/App/Base.lproj"
          cat > "ios/App/App/Base.lproj/LaunchScreen.storyboard" <<'XML'
          <?xml version="1.0" encoding="UTF-8"?>
          <document type="com.apple.InterfaceBuilder3.CocoaTouch.Storyboard.XIB" version="3.0" toolsVersion="22500" targetRuntime="iOS.CocoaTouch" propertyAccessControl="none" useAutolayout="YES" launchScreen="YES" useTraitCollections="YES" useSafeAreas="YES" colorMatched="YES" initialViewController="01J-lp-oVM">
              <device id="retina6_1" orientation="portrait" appearance="dark"/>
              <dependencies>
                  <plugIn identifier="com.apple.InterfaceBuilder.IBCocoaTouchPlugin" version="22504"/>
                  <capability name="Safe area layout guides" minToolsVersion="9.0"/>
                  <capability name="System colors in document resources" minToolsVersion="11.0"/>
                  <capability name="documents saved in the Xcode 8 format" minToolsVersion="8.0"/>
              </dependencies>
              <scenes>
                  <scene sceneID="EHf-IW-A2E">
                      <objects>
                          <viewController id="01J-lp-oVM" sceneMemberID="viewController">
                              <view key="view" contentMode="scaleToFill" insetsLayoutMarginsFromSafeArea="NO" id="Ze5-6b-2t3">
                                  <rect key="frame" x="0.0" y="0.0" width="390" height="844"/>
                                  <autoresizingMask key="autoresizingMask" widthSizable="YES" heightSizable="YES"/>
                                  <subviews>
                                      <imageView clipsSubviews="YES" userInteractionEnabled="NO" contentMode="scaleAspectFit" horizontalHuggingPriority="251" verticalHuggingPriority="251" image="Splash" translatesAutoresizingMaskIntoConstraints="NO" id="LOG-O0-001">
                                          <rect key="frame" x="95" y="322" width="200" height="200"/>
                                          <constraints>
                                              <constraint firstAttribute="width" constant="200" id="W00-00-001"/>
                                              <constraint firstAttribute="height" constant="200" id="H00-00-001"/>
                                          </constraints>
                                      </imageView>
                                  </subviews>
                                  <viewLayoutGuide key="safeArea" id="6Tk-OE-BBY"/>
                                  <color key="backgroundColor" red="0.039215686274509803" green="0.039215686274509803" blue="0.043137254901960784" alpha="1" colorSpace="custom" customColorSpace="sRGB"/>
                                  <constraints>
                                      <constraint firstItem="LOG-O0-001" firstAttribute="centerX" secondItem="Ze5-6b-2t3" secondAttribute="centerX" id="CX0-00-001"/>
                                      <constraint firstItem="LOG-O0-001" firstAttribute="centerY" secondItem="Ze5-6b-2t3" secondAttribute="centerY" id="CY0-00-001"/>
                                  </constraints>
                              </view>
                          </viewController>
                          <placeholder placeholderIdentifier="IBFirstResponder" id="iYj-Kq-Ea1" userLabel="First Responder" sceneMemberID="firstResponder"/>
                      </objects>
                      <point key="canvasLocation" x="53" y="375"/>
                  </scene>
              </scenes>
              <resources>
                  <image name="Splash" width="200" height="200"/>
              </resources>
          </document>
          XML

          # 3) LaunchScreen reference-i project.pbxproj-da var olmalidir.
          # Capacitor templati ile gelir, biz sadece sinhronlasdiririq.
          npx cap sync ios

      - name: Patch Podfile
        shell: bash
        run: |
          python3 - <<'PY'
          import re, pathlib
          p = pathlib.Path("ios/App/Podfile")
          src = p.read_text()
          src = re.sub(r"post_install\s+do\s+\|installer\|.*?\n\s*end\s*\n", "", src, flags=re.DOTALL)
          patch = """
          post_install do |installer|
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
                config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
                config.build_settings['CODE_SIGN_IDENTITY'] = ''
                config.build_settings['ENABLE_BITCODE'] = 'NO'
                config.build_settings['EXCLUDED_ARCHS[sdk=iphonesimulator*]'] = 'arm64'
              end
            end
          end
          """
          p.write_text(src.rstrip() + "\n\n" + patch.strip() + "\n")
          PY

      - name: Patch project.pbxproj
        shell: bash
        run: |
          PROJ="ios/App/App.xcodeproj/project.pbxproj"
          if [ -f "$PROJ" ]; then
            sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*;/IPHONEOS_DEPLOYMENT_TARGET = 13.0;/g' "$PROJ"
            sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' "$PROJ" || true
            sed -i '' 's/CODE_SIGN_IDENTITY = "[^"]*";/CODE_SIGN_IDENTITY = "";/g' "$PROJ" || true
            sed -i '' 's/DEVELOPMENT_TEAM = [A-Z0-9]*;/DEVELOPMENT_TEAM = "";/g' "$PROJ" || true
            sed -i '' "s/PRODUCT_BUNDLE_IDENTIFIER = [^;]*;/PRODUCT_BUNDLE_IDENTIFIER = ${BUNDLE_ID};/g" "$PROJ" || true
          fi

      - name: Patch AppDelegate (robust background audio)
        shell: bash
        run: |
          cat > ios/App/App/AppDelegate.swift <<'SWIFT'
          import UIKit
          import Capacitor
          import AVFoundation
          import MediaPlayer

          @UIApplicationMain
          class AppDelegate: UIResponder, UIApplicationDelegate {

              var window: UIWindow?

              // MARK: - Audio session
              private func activateAudioSession() {
                  let s = AVAudioSession.sharedInstance()
                  do {
                      // .playback + .longFormAudio = arxa plan / kilid ekran musiqi üçün doğru rejim
                      if #available(iOS 11.0, *) {
                          try s.setCategory(.playback,
                                            mode: .default,
                                            policy: .longFormAudio,
                                            options: [])
                      } else {
                          try s.setCategory(.playback, mode: .default, options: [])
                      }
                      try s.setActive(true, options: [])
                  } catch {
                      NSLog("AVAudioSession activate error: \(error)")
                  }
              }

              private func registerAudioObservers() {
                  let nc = NotificationCenter.default

                  // Zəng və ya başqa app interrupt etdikdə bitəndən sonra avtomatik bərpa
                  nc.addObserver(forName: AVAudioSession.interruptionNotification,
                                 object: nil,
                                 queue: .main) { [weak self] note in
                      guard
                          let info = note.userInfo,
                          let raw = info[AVAudioSessionInterruptionTypeKey] as? UInt,
                          let type = AVAudioSession.InterruptionType(rawValue: raw)
                      else { return }
                      if type == .ended {
                          var shouldResume = true
                          if let optsRaw = info[AVAudioSessionInterruptionOptionKey] as? UInt {
                              let opts = AVAudioSession.InterruptionOptions(rawValue: optsRaw)
                              shouldResume = opts.contains(.shouldResume)
                          }
                          if shouldResume {
                              self?.activateAudioSession()
                              // JS tərəfdə audio.play() yenidən cəhd edilsin
                              NotificationCenter.default.post(name: Notification.Name("RyAudioShouldResume"),
                                                              object: nil)
                          }
                      }
                  }

                  // Qulaqlıq çıxarıldıqda iOS standart davranışı: pauza. Bunu qoruyuruq.
                  nc.addObserver(forName: AVAudioSession.routeChangeNotification,
                                 object: nil,
                                 queue: .main) { _ in /* no-op */ }
              }

              // MARK: - App lifecycle
              func application(_ application: UIApplication,
                               didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
                  activateAudioSession()
                  registerAudioObservers()
                  // Remote control event-ləri (kilid ekranı düymələri) qəbul olunsun
                  application.beginReceivingRemoteControlEvents()
                  return true
              }

              func applicationWillResignActive(_ application: UIApplication) {}

              func applicationDidEnterBackground(_ application: UIApplication) {
                  // Arxa plana keçəndə sessiyanı bir daha aktiv saxlayaq
                  activateAudioSession()
              }

              func applicationWillEnterForeground(_ application: UIApplication) {
                  activateAudioSession()
              }

              func applicationDidBecomeActive(_ application: UIApplication) {
                  activateAudioSession()
              }

              func applicationWillTerminate(_ application: UIApplication) {
                  try? AVAudioSession.sharedInstance().setActive(false, options: [.notifyOthersOnDeactivation])
              }

              func application(_ app: UIApplication,
                               open url: URL,
                               options: [UIApplication.OpenURLOptionsKey: Any] = [:]) -> Bool {
                  return ApplicationDelegateProxy.shared.application(app, open: url, options: options)
              }

              func application(_ application: UIApplication,
                               continue userActivity: NSUserActivity,
                               restorationHandler: @escaping ([UIUserActivityRestoring]?) -> Void) -> Bool {
                  return ApplicationDelegateProxy.shared.application(application,
                                                                     continue: userActivity,
                                                                     restorationHandler: restorationHandler)
              }
          }
          SWIFT
          echo "AppDelegate.swift rewritten"

      - name: "Rewrite Info.plist (LaunchScreen + Audio BG + iOS 13+)"
        shell: bash
        run: |
          set -e
          PLIST="ios/App/App/Info.plist"
          cat > "$PLIST" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>en</string>
            <key>CFBundleDisplayName</key>
            <string>${APP_NAME}</string>
            <key>CFBundleName</key>
            <string>${APP_NAME}</string>
            <key>CFBundleExecutable</key>
            <string>App</string>
            <key>CFBundleIdentifier</key>
            <string>${BUNDLE_ID}</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0.1</string>
            <key>CFBundleVersion</key>
            <string>2</string>
            <key>CFBundleSignature</key>
            <string>????</string>
            <key>LSRequiresIPhoneOS</key>
            <true/>
            <key>MinimumOSVersion</key>
            <string>${DEPLOYMENT_TARGET}</string>
            <key>DTPlatformName</key>
            <string>iphoneos</string>
            <key>CFBundleSupportedPlatforms</key>
            <array>
              <string>iPhoneOS</string>
            </array>
            <key>CFBundleIconName</key>
            <string>AppIcon</string>
            <key>CFBundleIcons</key>
            <dict>
              <key>CFBundlePrimaryIcon</key>
              <dict>
                <key>CFBundleIconName</key>
                <string>AppIcon</string>
                <key>CFBundleIconFiles</key>
                <array>
                  <string>AppIcon60x60</string>
                </array>
              </dict>
            </dict>
            <key>CFBundleIcons~ipad</key>
            <dict>
              <key>CFBundlePrimaryIcon</key>
              <dict>
                <key>CFBundleIconName</key>
                <string>AppIcon</string>
                <key>CFBundleIconFiles</key>
                <array>
                  <string>AppIcon60x60</string>
                  <string>AppIcon76x76</string>
                </array>
              </dict>
            </dict>
            <key>UIBackgroundModes</key>
            <array>
              <string>audio</string>
              <string>fetch</string>
            </array>
            <key>NSAppTransportSecurity</key>
            <dict>
              <key>NSAllowsArbitraryLoads</key>
              <true/>
              <key>NSAllowsArbitraryLoadsInWebContent</key>
              <true/>
