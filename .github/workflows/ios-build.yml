name: Build iOS Unsigned IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Node.js xəbərdarlığını aradan qaldırır

jobs:
  build:
    name: Build unsigned IPA
    runs-on: macos-14
    timeout-minutes: 60
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24 # Ən son stabil Node versiyası

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install JS dependencies
        run: |
          npm install --legacy-peer-deps

      - name: Build React web app
        run: |
          cat > .env.production <<EOF
          REACT_APP_BACKEND_URL=https://ryhavean-spotify-backend.onrender.com
          GENERATE_SOURCEMAP=false
          EOF
          npm run build

      - name: Add iOS native project (Capacitor)
        run: |
          npx cap add ios || npx cap sync ios
          npx cap sync ios

      - name: Configure iOS app (Info.plist & Bundle ID)
        run: |
          set -e
          PLIST="ios/App/App/Info.plist"
          if [ -f "$PLIST" ]; then
            /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName Ryhavean" "$PLIST" 2>/dev/null || \
              /usr/libexec/PlistBuddy -c "Add :CFBundleDisplayName string Ryhavean" "$PLIST"
            /usr/libexec/PlistBuddy -c "Set :CFBundleName Ryhavean" "$PLIST" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier com.ryhavean.music" "$PLIST" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes array" "$PLIST" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes:0 string audio" "$PLIST" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes:1 string fetch" "$PLIST" 2>/dev/null || true
          fi

      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install --repo-update

      - name: Build unsigned .xcarchive
        run: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$PWD/build/Ryhavean.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            archive | xcpretty || exit 1

      - name: Package unsigned IPA
        run: |
          cd ios/App
          mkdir -p build/Payload
          APP_PATH=$(find build/Ryhavean.xcarchive/Products/Applications -maxdepth 1 -type d -name "*.app" | head -n 1)
          cp -R "$APP_PATH" build/Payload/
          cd build
          zip -qr Ryhavean-unsigned.ipa Payload
          rm -rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ryhavean-unsigned-ipa
          path: frontend/ios/App/build/Ryhavean-unsigned.ipa
          retention-days: 30
