name: Build iOS IPA (Scarlet 1.0 Compatible - ULTIMATE)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Build Scarlet-compatible IPA
    runs-on: macos-14
    timeout-minutes: 60
    defaults:
      run:
        working-directory: frontend

    env:
      APP_NAME: Ryhavean
      BUNDLE_ID: com.ryhavean.spotify
      DEPLOYMENT_TARGET: "13.0"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.20.4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install ldid
        shell: bash
        run: brew install ldid || true

      - name: Install JS dependencies
        shell: bash
        run: |
          set -e
          export NODE_OPTIONS="--max_old_space_size=4096 --openssl-legacy-provider"
          rm -rf node_modules package-lock.json
          if ! command -v yarn >/dev/null 2>&1; then npm install -g yarn --force; fi
          yarn install --network-timeout 600000 --ignore-engines

      - name: Build React web app
        shell: bash
        run: |
          set -e
          export NODE_OPTIONS="--max_old_space_size=4096 --openssl-legacy-provider"
          export DISABLE_ESLINT_PLUGIN=true SKIP_PREFLIGHT_CHECK=true
          cat > .env.production <<EOF
          REACT_APP_BACKEND_URL=https://ryhavean-spotify-backend.onrender.com
          GENERATE_SOURCEMAP=false
          EOF
          CI=false yarn build

      - name: Add iOS native project
        run: |
          if [ ! -d "ios" ]; then npx cap add ios; fi
          npx cap sync ios

      - name: Setup AppIcon.appiconset
        shell: bash
        run: |
          set -e
          ICON_SRC="public/ios-icons"
          ICON_DST="ios/App/App/Assets.xcassets/AppIcon.appiconset"
          mkdir -p "$ICON_DST"
          for sz in 20 29 40 58 60 76 80 87 120 152 167 180 1024; do
            [ -f "$ICON_SRC/AppIcon-${sz}.png" ] && cp -f "$ICON_SRC/AppIcon-${sz}.png" "$ICON_DST/"
          done
          cat > "$ICON_DST/Contents.json" <<'JSON'
          {
            "images" : [
              { "size" : "20x20", "idiom" : "iphone", "filename" : "AppIcon-40.png", "scale" : "2x" },
              { "size" : "20x20", "idiom" : "iphone", "filename" : "AppIcon-60.png", "scale" : "3x" },
              { "size" : "29x29", "idiom" : "iphone", "filename" : "AppIcon-58.png", "scale" : "2x" },
              { "size" : "29x29", "idiom" : "iphone", "filename" : "AppIcon-87.png", "scale" : "3x" },
              { "size" : "40x40", "idiom" : "iphone", "filename" : "AppIcon-80.png", "scale" : "2x" },
              { "size" : "40x40", "idiom" : "iphone", "filename" : "AppIcon-120.png", "scale" : "3x" },
              { "size" : "60x60", "idiom" : "iphone", "filename" : "AppIcon-120.png", "scale" : "2x" },
              { "size" : "60x60", "idiom" : "iphone", "filename" : "AppIcon-180.png", "scale" : "3x" },
              { "size" : "20x20", "idiom" : "ipad", "filename" : "AppIcon-20.png", "scale" : "1x" },
              { "size" : "20x20", "idiom" : "ipad", "filename" : "AppIcon-40.png", "scale" : "2x" },
              { "size" : "29x29", "idiom" : "ipad", "filename" : "AppIcon-29.png", "scale" : "1x" },
              { "size" : "29x29", "idiom" : "ipad", "filename" : "AppIcon-58.png", "scale" : "2x" },
              { "size" : "40x40", "idiom" : "ipad", "filename" : "AppIcon-40.png", "scale" : "1x" },
              { "size" : "40x40", "idiom" : "ipad", "filename" : "AppIcon-80.png", "scale" : "2x" },
              { "size" : "76x76", "idiom" : "ipad", "filename" : "AppIcon-76.png", "scale" : "1x" },
              { "size" : "76x76", "idiom" : "ipad", "filename" : "AppIcon-152.png", "scale" : "2x" },
              { "size" : "83.5x83.5", "idiom" : "ipad", "filename" : "AppIcon-167.png", "scale" : "2x" },
              { "size" : "1024x1024", "idiom" : "ios-marketing", "filename" : "AppIcon-1024.png", "scale" : "1x" }
            ],
            "info" : { "version" : 1, "author" : "xcode" }
          }
          JSON

      - name: Patch Podfile
        shell: bash
        run: |
          python3 - <<'PY'
          import re, pathlib
          p = pathlib.Path("ios/App/Podfile")
          src = p.read_text()
          src = re.sub(r"post_install\s+do\s+\|installer\|.*?\n\s*end\s*\n", "", src, flags=re.DOTALL)
          patch = """
          post_install do |installer|
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
                config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
                config.build_settings['CODE_SIGN_IDENTITY'] = ''
                config.build_settings['ENABLE_BITCODE'] = 'NO'
                config.build_settings['EXCLUDED_ARCHS[sdk=iphonesimulator*]'] = 'arm64'
              end
            end
          end
          """
          p.write_text(src.rstrip() + "\n\n" + patch.strip() + "\n")
          PY

      - name: Patch project.pbxproj
        shell: bash
        run: |
          PROJ="ios/App/App.xcodeproj/project.pbxproj"
          if [ -f "$PROJ" ]; then
            sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*;/IPHONEOS_DEPLOYMENT_TARGET = 13.0;/g' "$PROJ"
            sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' "$PROJ" || true
            sed -i '' 's/CODE_SIGN_IDENTITY = "[^"]*";/CODE_SIGN_IDENTITY = "";/g' "$PROJ" || true
            sed -i '' 's/DEVELOPMENT_TEAM = [A-Z0-9]*;/DEVELOPMENT_TEAM = "";/g' "$PROJ" || true
            sed -i '' "s/PRODUCT_BUNDLE_IDENTIFIER = [^;]*;/PRODUCT_BUNDLE_IDENTIFIER = ${BUNDLE_ID};/g" "$PROJ" || true
          fi

      - name: Patch AppDelegate.swift
        shell: bash
        run: |
          python3 - <<'PY'
          import re, pathlib
          p = pathlib.Path("ios/App/App/AppDelegate.swift")
          src = p.read_text()
          if "import AVFoundation" not in src:
              src = re.sub(r"(import UIKit\s*\n)", r"\1import AVFoundation\n", src, count=1)
          if "AVAudioSession.sharedInstance()" not in src:
              audio = ('        do {\n            let s = AVAudioSession.sharedInstance()\n'
                       '            try s.setCategory(.playback, mode: .default, options: [])\n'
                       '            try s.setActive(true)\n        } catch {}\n')
              src, _ = re.subn(r"(func application\([^)]*didFinishLaunchingWithOptions[^{]*\{\s*\n)", r"\1" + audio, src, count=1)
          p.write_text(src)
          PY

      - name: Fix Info.plist
        shell: bash
        run: |
          set -e
          PLIST="ios/App/App/Info.plist"
          PB=/usr/libexec/PlistBuddy
          $PB -c "Set :CFBundleDisplayName ${APP_NAME}" "$PLIST" 2>/dev/null || $PB -c "Add :CFBundleDisplayName string ${APP_NAME}" "$PLIST"
          $PB -c "Set :CFBundleName ${APP_NAME}" "$PLIST" 2>/dev/null || $PB -c "Add :CFBundleName string ${APP_NAME}" "$PLIST"
          $PB -c "Set :CFBundleExecutable App" "$PLIST" 2>/dev/null || $PB -c "Add :CFBundleExecutable string App" "$PLIST"
          $PB -c "Set :CFBundleIdentifier ${BUNDLE_ID}" "$PLIST" 2>/dev/null || $PB -c "Add :CFBundleIdentifier string ${BUNDLE_ID}" "$PLIST"
          $PB -c "Set :CFBundleShortVersionString 1.0.0" "$PLIST" 2>/dev/null || $PB -c "Add :CFBundleShortVersionString string 1.0.0" "$PLIST"
          $PB -c "Set :CFBundleVersion 1" "$PLIST" 2>/dev/null || $PB -c "Add :CFBundleVersion string 1" "$PLIST"
          $PB -c "Set :CFBundlePackageType APPL" "$PLIST" 2>/dev/null || $PB -c "Add :CFBundlePackageType string APPL" "$PLIST"
          $PB -c "Set :LSRequiresIPhoneOS true" "$PLIST" 2>/dev/null || $PB -c "Add :LSRequiresIPhoneOS bool true" "$PLIST"
          $PB -c "Set :MinimumOSVersion ${DEPLOYMENT_TARGET}" "$PLIST" 2>/dev/null || $PB -c "Add :MinimumOSVersion string ${DEPLOYMENT_TARGET}" "$PLIST"
          $PB -c "Set :DTPlatformName iphoneos" "$PLIST" 2>/dev/null || $PB -c "Add :DTPlatformName string iphoneos" "$PLIST"
          $PB -c "Delete :CFBundleSupportedPlatforms" "$PLIST" 2>/dev/null || true
          $PB -c "Add :CFBundleSupportedPlatforms array" "$PLIST"
          $PB -c "Add :CFBundleSupportedPlatforms:0 string iPhoneOS" "$PLIST"
          $PB -c "Set :CFBundleIconName AppIcon" "$PLIST" 2>/dev/null || $PB -c "Add :CFBundleIconName string AppIcon" "$PLIST"
          $PB -c "Delete :CFBundleIcons" "$PLIST" 2>/dev/null || true
          $PB -c "Add :CFBundleIcons dict" "$PLIST"
          $PB -c "Add :CFBundleIcons:CFBundlePrimaryIcon dict" "$PLIST"
          $PB -c "Add :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconName string AppIcon" "$PLIST"
          $PB -c "Add :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconFiles array" "$PLIST"
          $PB -c "Add :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconFiles:0 string AppIcon60x60" "$PLIST"
          $PB -c "Add :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconFiles:1 string AppIcon76x76" "$PLIST"
          $PB -c "Delete :UIBackgroundModes" "$PLIST" 2>/dev/null || true
          $PB -c "Add :UIBackgroundModes array" "$PLIST"
          $PB -c "Add :UIBackgroundModes:0 string audio" "$PLIST"
          $PB -c "Add :UIBackgroundModes:1 string fetch" "$PLIST"
          $PB -c "Delete :NSAppTransportSecurity" "$PLIST" 2>/dev/null || true
          $PB -c "Add :NSAppTransportSecurity dict" "$PLIST"
          $PB -c "Add :NSAppTransportSecurity:NSAllowsArbitraryLoads bool true" "$PLIST"
          $PB -c "Delete :UIDeviceFamily" "$PLIST" 2>/dev/null || true
          $PB -c "Add :UIDeviceFamily array" "$PLIST"
          $PB -c "Add :UIDeviceFamily:0 integer 1" "$PLIST"
          $PB -c "Add :UIDeviceFamily:1 integer 2" "$PLIST"
          $PB -c "Delete :UISupportedInterfaceOrientations" "$PLIST" 2>/dev/null || true
          $PB -c "Add :UISupportedInterfaceOrientations array" "$PLIST"
          $PB -c "Add :UISupportedInterfaceOrientations:0 string UIInterfaceOrientationPortrait" "$PLIST"
          $PB -c "Set :ITSAppUsesNonExemptEncryption false" "$PLIST" 2>/dev/null || $PB -c "Add :ITSAppUsesNonExemptEncryption bool false" "$PLIST"
          plutil -convert binary1 "$PLIST" || true

      - name: Install CocoaPods
        run: cd ios/App && pod install --repo-update

      - name: Build Unsigned Archive
        shell: bash
        run: |
          set -e
          set -o pipefail
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace -scheme App \
            -configuration Release -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -archivePath "$PWD/build/${APP_NAME}.xcarchive" \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            ENABLE_BITCODE=NO ARCHS=arm64 \
            IPHONEOS_DEPLOYMENT_TARGET=13.0 \
            archive 2>&1 | tee build.log

      - name: "🔥 SCARLET 1.0 COMPATIBLE SIGNING (FINAL)"
        shell: bash
        run: |
          set -e
          cd ios/App
          
          APP_PATH=$(find "build/${APP_NAME}.xcarchive/Products/Applications" -maxdepth 1 -type d -name "*.app" | head -n 1)
          BINARY="$APP_PATH/App"
          
          echo "📍 App: $APP_PATH"
          echo "📍 Binary: $BINARY"
          
          # ============================================
          # ADIM 1: TÜM İMZALARI TEMİZLE
          # ============================================
          echo "=== ADIM 1: İmzalar temizleniyor ==="
          find "$APP_PATH" -name "_CodeSignature" -type d -exec rm -rf {} + 2>/dev/null || true
          find "$APP_PATH" -name "CodeResources" -delete 2>/dev/null || true
          find "$APP_PATH" -name "embedded.mobileprovision" -delete 2>/dev/null || true
          find "$APP_PATH" -name ".DS_Store" -delete 2>/dev/null || true
          find "$APP_PATH" -name "*.xctest" -type d -exec rm -rf {} + 2>/dev/null || true
          
          # Binary'deki LC_CODE_SIGNATURE temizle
          if [ -f "$BINARY" ]; then
            python3 -c "
            import struct, os
            f = '$BINARY'
            if os.path.exists(f):
                with open(f, 'rb') as fh:
                    data = bytearray(fh.read())
                magic = struct.unpack_from('<I', data, 0)[0]
                if magic == 0xFEEDFACF:
                    ncmds = struct.unpack_from('<I', data, 16)[0]
                    offset = 32
                    cleaned = 0
                    for i in range(ncmds):
                        if offset + 8 > len(data): break
                        cmd = struct.unpack_from('<I', data, offset)[0]
                        cmdsize = struct.unpack_from('<I', data, offset+4)[0]
                        if cmd == 0x1d:
                            for j in range(offset, min(offset+cmdsize, len(data))): data[j] = 0
                            cleaned += 1
                        elif cmd == 0: break
                        offset += cmdsize
                        if offset >= len(data): break
                    with open(f, 'wb') as fh: fh.write(data)
                    print(f'Cleaned {cleaned} LC_CODE_SIGNATURE')
                else:
                    print(f'Magic: 0x{magic:08x}')
            " 2>/dev/null || true
          fi
          
          # ============================================
          # ADIM 2: Entitlements (Scarlet 1.0 dostu)
          # ============================================
          echo "=== ADIM 2: Entitlements ==="
          cat > /tmp/scarlet_ent.xml <<'ENTEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>get-task-allow</key>
              <true/>
              <key>application-identifier</key>
              <string>AAAAAAAAAA.com.ryhavean.spotify</string>
              <key>com.apple.developer.team-identifier</key>
              <string>AAAAAAAAAA</string>
              <key>keychain-access-groups</key>
              <array>
                  <string>AAAAAAAAAA.com.ryhavean.spotify</string>
              </array>
          </dict>
          </plist>
          ENTEOF
          
          # ============================================
          # ADIM 3: Framework'leri imzala
          # ============================================
          echo "=== ADIM 3: Frameworks ==="
          if [ -d "$APP_PATH/Frameworks" ]; then
            for fw in "$APP_PATH/Frameworks"/*.framework; do
              [ -d "$fw" ] || continue
              fw_binary="$fw/$(basename "$fw" .framework)"
              if [ -f "$fw_binary" ]; then
                ldid -S /tmp/scarlet_ent.xml "$fw_binary" 2>/dev/null || true
                echo "  → $(basename $fw)"
              fi
              find "$fw" -name "*.dylib" -type f | while read d; do
                ldid -S /tmp/scarlet_ent.xml "$d" 2>/dev/null || true
              done
            done
          fi
          
          # Diğer dylib'ler
          find "$APP_PATH" -name "*.dylib" -type f | while read d; do
            case "$d" in */Frameworks/*) ;; *) 
              ldid -S /tmp/scarlet_ent.xml "$d" 2>/dev/null || true
              echo "  → dylib: $(basename $d)"
              ;;
            esac
          done
          
          # ============================================
          # ADIM 4: Ana binary'yi ldid ile imzala
          # ============================================
          echo "=== ADIM 4: Ana binary ldid ==="
          if [ -f "$BINARY" ]; then
            ldid -S /tmp/scarlet_ent.xml "$BINARY"
            echo "✅ ldid tamam"
          else
            echo "❌ Binary bulunamadı!"
            ls -la "$APP_PATH/"
            exit 1
          fi
          
          # ============================================
          # ADIM 5: codesign (Scarlet 1.0 için yedek)
          # ============================================
          echo "=== ADIM 5: codesign ==="
          codesign --force --sign - --timestamp=none "$APP_PATH" 2>/dev/null && echo "✅ codesign tamam" || echo "⚠️ codesign geçildi"
          
          # ============================================
          # ADIM 6: embedded.mobileprovision
          # ============================================
          echo "=== ADIM 6: embedded.mobileprovision ==="
          cat > "$APP_PATH/embedded.mobileprovision" <<'MPEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>AppIDName</key>
              <string>Ryhavean</string>
              <key>ApplicationIdentifierPrefix</key>
              <array><string>AAAAAAAAAA</string></array>
              <key>CreationDate</key>
              <date>2026-01-01T00:00:00Z</date>
              <key>DeveloperCertificates</key>
              <array><data></data></array>
              <key>Entitlements</key>
              <dict>
                  <key>get-task-allow</key>
                  <true/>
                  <key>application-identifier</key>
                  <string>AAAAAAAAAA.com.ryhavean.spotify</string>
                  <key>keychain-access-groups</key>
                  <array><string>AAAAAAAAAA.*</string></array>
              </dict>
              <key>ExpirationDate</key>
              <date>2030-01-01T00:00:00Z</date>
              <key>Name</key>
              <string>Scarlet Profile</string>
              <key>ProvisionedDevices</key>
              <array/>
              <key>TeamIdentifier</key>
              <array><string>AAAAAAAAAA</string></array>
              <key>TimeToLive</key>
              <integer>0</integer>
              <key>UUID</key>
              <string>00000000-0000-0000-0000-000000000000</string>
              <key>Version</key>
              <integer>1</integer>
          </dict>
          </plist>
          MPEOF
          echo "✅ embedded.mobileprovision tamam"
          
          echo ""
          echo "✅ TÜM İMZALAMA TAMAM"

      - name: Package IPA (Scarlet Optimized)
        shell: bash
        run: |
          set -e
          cd ios/App
          
          APP_PATH=$(find "build/${APP_NAME}.xcarchive/Products/Applications" -maxdepth 1 -type d -name "*.app" | head -n 1)
          APP_BASENAME=$(basename "$APP_PATH")
          
          echo "=== IPA Paketleme ==="
          
          rm -rf build/Payload
          mkdir -p build/Payload
          cp -R "$APP_PATH" "build/Payload/"
          DEST_APP="build/Payload/${APP_BASENAME}"
          
          find "$DEST_APP" -name ".DS_Store" -delete 2>/dev/null || true
          
          echo "BundleID: $(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' ${DEST_APP}/Info.plist 2>/dev/null)"
          
          cd build
          rm -f "${APP_NAME}.ipa"
          zip -qry -X "${APP_NAME}.ipa" Payload
          rm -rf Payload
          
          echo "✅ IPA: $(du -h ${APP_NAME}.ipa | cut -f1)"
          
          # Doğrulama
          echo "=== Doğrulama ==="
          unzip -l "${APP_NAME}.ipa" | head -15
          unzip -l "${APP_NAME}.ipa" | grep -q "embedded.mobileprovision" && echo "✅ mobileprovision var" || echo "⚠️ mobileprovision yok"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Ryhavean-Final-IPA
          path: frontend/ios/App/build/Ryhavean.ipa
          retention-days: 30

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: frontend/ios/App/build.log
